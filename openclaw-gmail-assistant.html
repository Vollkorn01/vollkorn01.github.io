<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Gmail Assistant</title>
    <style>
      :root {
        --bg-1: #090f1f;
        --bg-2: #121926;
        --card: rgba(255, 255, 255, 0.08);
        --card-border: rgba(255, 255, 255, 0.18);
        --text: #f5f7ff;
        --muted: #bec7ea;
        --accent-1: #0d6efd;
        --accent-2: #ff2a2a;
        --accent-3: #ffcf21;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter,
          "SF Pro Text",
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 700px at 20% -10%, rgba(255, 42, 42, 0.22), transparent 55%),
          radial-gradient(1000px 700px at 110% 110%, rgba(13, 110, 253, 0.25), transparent 50%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2) 55%, #1b273f 100%);
        display: grid;
        place-items: center;
        padding: 32px 18px;
      }

      .wrap {
        width: min(760px, 100%);
      }

      .card {
        position: relative;
        overflow: hidden;
        border-radius: 24px;
        border: 1px solid var(--card-border);
        background: linear-gradient(165deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04));
        backdrop-filter: blur(10px);
        padding: 30px;
        box-shadow:
          0 18px 65px rgba(0, 0, 0, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -2px;
        z-index: -1;
        border-radius: 24px;
        background: linear-gradient(120deg, var(--accent-2), var(--accent-3), var(--accent-1));
        opacity: 0.35;
        filter: blur(24px);
      }

      .header {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.35);
        background: rgba(255, 255, 255, 0.08);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.75rem, 3vw, 2.3rem);
        letter-spacing: 0.2px;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.55;
      }

      .section {
        margin-top: 24px;
        padding-top: 22px;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
      }

      .section p {
        margin: 0;
        line-height: 1.7;
        color: #e6ebff;
      }

      .contact {
        margin-top: 16px;
        font-weight: 600;
        color: #e9f0ff;
      }

      a {
        color: #b6ddff;
        text-decoration: none;
        border-bottom: 1px dashed rgba(182, 221, 255, 0.55);
      }

      a:hover {
        color: #ddf3ff;
        border-bottom-color: rgba(221, 243, 255, 0.95);
      }

      .links {
        margin: 14px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 9px;
      }

      .links li {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #e8efff;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 99px;
        background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
        box-shadow: 0 0 0 5px rgba(94, 161, 255, 0.18);
      }

      .footer {
        margin-top: 20px;
        color: var(--muted);
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <header class="header">
          <img
            src="assets/openclaw-logo.png"
            alt="OpenClaw Gmail Assistant logo"
            class="logo"
            onerror="this.style.display='none'"
          />
          <div>
            <h1>OpenClaw Gmail Assistant</h1>
            <p class="subtitle">
              Personal automation tool for Gmail and Calendar management.
            </p>
          </div>
        </header>

        <div class="section">
          <p>
            Built for personal use to streamline email and scheduling workflows.
          </p>
          <p class="contact">
            Contact:
            <a href="mailto:alexander.pfyffer@gmail.com">alexander.pfyffer@gmail.com</a>
          </p>

          <ul class="links">
            <li>
              <span class="dot" aria-hidden="true"></span>
              Privacy Policy:
              <a href="/openclaw-privacy-policy.html" aria-label="Privacy Policy">View</a>
            </li>
            <li>
              <span class="dot" aria-hidden="true"></span>
              Terms of Service:
              <a href="/openclaw-terms-of-service.html" aria-label="Terms of Service">View</a>
            </li>
          </ul>

          <p class="footer">OpenClaw Gmail Assistant</p>
        </div>
      </section>
    </main>
  </body>
</html>
